name: APEX_PROTOCOL_CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-and-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: [AppSec] Static Analysis Security Testing (Bandit)
      run: |
        bandit -r src/ -ll -v

    - name: [Quality] Linting (Ruff)
      run: |
        ruff check src/

    - name: [Quality] Static Type Checking (Mypy)
      run: |
        mypy --strict src/

    - name: [Quality] Unit Testing (Pytest)
      run: |
        pytest tests/

  container-scan:
    runs-on: ubuntu-latest
    needs: security-and-quality
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker Image
      run: docker build -t ai-slop-detector:latest -f deploy/Dockerfile .

    - name: [AppSec] Container Security Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'ai-slop-detector:latest'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
