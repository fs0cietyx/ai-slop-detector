name: Production CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  hardening:
    name: Security & Quality Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit pytest
          pip install -r requirements.txt

      - name: 🚨 Ruff (Linting & Formatting)
        run: ruff check .

      - name: 🧠 Mypy (Static Typing Audit)
        run: |
          export MYPYPATH=src
          mypy --config-file mypy.ini --explicit-package-bases src/core src/predict.py

      - name: 🕵️ Bandit (SAST Security Scan)
        run: bandit -r src/ -s B311,B615,B112

      - name: 🧪 Unit Tests
        run: |
          pytest tests/
